<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat app</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body class="h-screen">
    <!-- NAVBAR START-->
    <div class="navbar bg-base-100 shadow-md">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h8m-8 6h16"
              />
            </svg>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
          >
            <li><a>Login</a></li>
            <li><a>Register</a></li>
            <li><a>Users</a></li>
          </ul>
        </div>
        <a class="btn btn-ghost text-xl" href="../index.html"
          ><i data-lucide="message-square" class="size-6"></i>VVChat</a
        >
      </div>
      <div class="navbar-end">
        <label class="toggle text-base-content">
          <input type="checkbox" value="dark" class="theme-controller" />

          <svg
            aria-label="sun"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="m4.93 4.93 1.41 1.41"></path>
              <path d="m17.66 17.66 1.41 1.41"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="m6.34 17.66-1.41 1.41"></path>
              <path d="m19.07 4.93-1.41 1.41"></path>
            </g>
          </svg>

          <svg
            aria-label="moon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2"
              fill="none"
              stroke="currentColor"
            >
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </g>
          </svg>
        </label>
      </div>
    </div>
    <!-- NAVBAR END-->
    <!-- LOGIN SECTION START -->
    <div class="flex justify-center items-center h-[90vh]">
      <form
        class="card w-96 bg-base-100 border border-accent"
        onsubmit="loginUser(event)"
      >
        <div class="card-body">
          <h2 class="text-2xl font-bold text-center">Login</h2>
          <div>
            <label for="email" class="flex gap-2 items-center">
              <i data-lucide="mail" class="w-4"></i> Email
            </label>
            <input
              type="email"
              placeholder="Email"
              id="email"
              class="input input-accent mt-2"
            />
          </div>
          <div>
            <label for="password" class="flex gap-2 items-center">
              <i data-lucide="rectangle-ellipsis" class="w-4"></i> Password
            </label>
            <input
              type="password"
              placeholder="Password"
              id="password"
              class="input input-accent mt-2"
            />
          </div>
          <p class="mt-3">
            Don't have an account?
            <a href="./register.html" class="underline text-primary"
              >Register</a
            >
          </p>
          <button class="btn btn-accent w-[95%] mt-3">Login</button>
        </div>
      </form>
    </div>
    <!-- LOGIN SECTION END -->
    <script src="../scripts/login.js"></script>
    <!-- ICONS START -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <!-- ICONS END -->
  </body>
</html>
